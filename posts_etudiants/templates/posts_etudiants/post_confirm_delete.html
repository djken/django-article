{% extends 'base.html' %}

{% block title %}Supprimer {{ post.titre }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-body">
                <h2 class="card-title">Supprimer le post</h2>
                <p>Êtes-vous sûr de vouloir supprimer "{{ post.titre }}" ?</p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Oui, supprimer</button>
                    <a href="{% url 'liste_posts' %}" class="btn btn-secondary">Annuler</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
